services:
  - type: web
    runtime: docker
    name: brighthaus
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    envVars:
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        value: whsec_placeholder
      - key: PORT
        value: 3000
      - key: FRONTEND_URL
        value: https://brighthaus.onrender.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: BrightHaus <cesarro.mtz.sillas@gmail.com>
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        sync: false
